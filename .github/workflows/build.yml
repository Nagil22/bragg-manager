name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create adminSecret
        run: |
          cat > src/main/adminSecret.ts << 'EOF'
          export const ADMIN_PASSWORD = '${{ secrets.ADMIN_PASSWORD }}';
          EOF
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Package x64
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Package arm64
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create adminSecret
        shell: pwsh
        run: |
          Set-Content -Path src/main/adminSecret.ts -Value "export const ADMIN_PASSWORD = '${{ secrets.ADMIN_PASSWORD }}';"
      - run: npm ci
      - name: Package
        run: npm run build && npx electron-builder --win --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe
