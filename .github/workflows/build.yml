name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create adminSecret
        run: |
          cat > src/main/adminSecret.ts << 'EOF'
          export const ADMIN_PASSWORD = '${{ secrets.ADMIN_PASSWORD }}';
          EOF
      - run: npm ci
      - name: Patch electron-builder PKG unlink bug
        run: |
          node -e "
          const fs = require('fs');
          const f = 'node_modules/app-builder-lib/out/targets/pkg.js';
          let s = fs.readFileSync(f, 'utf8');
          s = s.replace(/(unlink|remove)\(tempPkg\)/g, '\$1(tempPkg).catch(()=>{})');
          fs.writeFileSync(f, s);
          console.log('patched');
          "
      - name: Build
        run: npm run build
      - name: Package x64
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Package arm64
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            release/*.dmg
            release/*.pkg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Create adminSecret
        shell: pwsh
        run: |
          Set-Content -Path src/main/adminSecret.ts -Value "export const ADMIN_PASSWORD = '${{ secrets.ADMIN_PASSWORD }}';"
      - run: npm ci
      - name: Package
        run: npm run build && npx electron-builder --win --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    # Only create a release when triggered by a version tag, not workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac
      - uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: artifacts/win
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Bragg Manager ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## Download

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `*-arm64.pkg` | ✅ Recommended — installs automatically |
            | macOS (Intel) | `*-x64.pkg` | ✅ Recommended — installs automatically |
            | macOS (Apple Silicon) | `*-arm64.dmg` | Manual drag-to-Applications |
            | macOS (Intel) | `*-x64.dmg` | Manual drag-to-Applications |
            | Windows 10/11 | `*.exe` | |

            **macOS PKG:** Opens a standard installer wizard and removes the Gatekeeper warning automatically. Right-click → Open if macOS asks.

            **macOS DMG (manual):** If you use the DMG instead, open Terminal and run once:
            ```
            xattr -cr /Applications/Bragg\ Manager.app
            ```
          files: |
            artifacts/mac/*.dmg
            artifacts/mac/*.pkg
            artifacts/win/*.exe
